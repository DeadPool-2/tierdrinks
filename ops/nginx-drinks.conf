# drinks.bondapp.ru → TierDrinks node server on 127.0.0.1:3000
# TLS: bondapp.ru is behind Cloudflare (proxied). Easiest path — keep this
# :80 block and set the Cloudflare record for `drinks` to Proxied + SSL "Full".
# For a direct cert instead: `certbot --nginx -d drinks.bondapp.ru`.

server {
    listen 80;
    listen [::]:80;
    server_name drinks.bondapp.ru;

    # uploaded/downloaded product photos are small; allow a little headroom
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
