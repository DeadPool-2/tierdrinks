<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#08090b" />
    <title>TierDrinks — рейтинг энергетиков</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <link rel="stylesheet" href="/styles.css?v=6" />
  </head>
  <body>
    <header class="topbar">
      <div class="logo">⚡ TierDrinks</div>
      <div class="profile" id="profile"></div>
    </header>

    <nav class="tabs" id="tabs">
      <button data-view="catalog" class="tab active">Каталог</button>
      <button data-view="tier" class="tab">Тир-лист</button>
      <button data-view="stats" class="tab">Всё</button>
      <button data-view="add" class="tab">＋</button>
    </nav>

    <main id="view"></main>
    <div id="modal-root"></div>

    <!-- profile picker overlay (first launch) -->
    <div id="gate" class="gate hidden">
      <div class="gate-card">
        <div class="gate-title">Кто оценивает?</div>
        <div class="gate-sub">Выбери свой профиль — оценки будут общими.</div>
        <div class="gate-btns">
          <button class="gate-btn" data-user="a">Миша</button>
          <button class="gate-btn" data-user="b">Тимур</button>
        </div>
      </div>
    </div>

    <script src="/app.js?v=6" type="module"></script>
  </body>
</html>
